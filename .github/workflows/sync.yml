name: Running Sync

on:
  workflow_dispatch:
    inputs:
      activity_id:
        description: "Strava activity ID"
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-api-python-client google-auth google-auth-oauthlib

      - name: Print trigger info
        run: |
          echo "Activity ID:"
          echo "${{ github.event.inputs.activity_id }}"

      - name: Download Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python scripts/download_fit.py

      - name: Parse data
        run: |
          python scripts/parse_fit.py

      - name: Upload report to Google Drive
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python scripts/upload_drive.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: running-data
          path: |
            activity.fit
            activity.json
            workout.json
            running-data.json